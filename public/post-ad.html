<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Ad | Omnivo Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --om-orange: #ff5722;
            --om-black: #000000;
            --om-white: #ffffff;
            --om-grey: #f4f4f4;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--om-white); 
            margin: 0; padding: 0; color: var(--om-black);
        }

        .wizard-container { max-width: 480px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .thick-line { height: 5px; background: var(--om-orange); width: 100%; margin-bottom: 30px; }
        .step { display: none; } 
        .step.active { display: block !important; animation: fadeIn 0.4s; } 

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 26px; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }

        label { 
            display: block; font-size: 11px; font-weight: 700; color: var(--om-black); 
            text-transform: uppercase; margin-bottom: 8px; margin-top: 20px;
        }

        input, select, textarea {
            width: 100%; padding: 12px 0; margin-bottom: 10px; border: none;
            border-bottom: 2px solid var(--om-black); font-size: 16px; outline: none;
            background: transparent; border-radius: 0; transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus { border-bottom-color: var(--om-orange); }
        textarea { height: 100px; resize: none; }

        .section-tag {
            background: var(--om-black); color: var(--om-white); display: inline-block;
            padding: 4px 10px; font-size: 12px; font-weight: bold; margin-top: 30px; margin-bottom: 10px;
        }

        .btn-black {
            width: 100%; padding: 20px; background: var(--om-black); color: var(--om-white);
            border: none; border-radius: 4px; font-size: 16px; font-weight: 700;
            cursor: pointer; margin-top: 30px; text-transform: uppercase; transition: 0.3s;
        }

        .btn-black:hover { background: var(--om-orange); }

        .location-list { 
            padding: 20px 10px; border-bottom: 1px solid #eee; cursor: pointer; 
            font-size: 18px; font-weight: 600; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }

        .location-list:after { content: '\f054'; font-family: "Font Awesome 6 Free"; font-weight: 900; font-size: 14px; color: #ccc; }
        .location-list:hover { color: var(--om-orange); background: #fffcfb; padding-left: 20px; }

        .success-box { text-align: center; padding: 60px 20px; }
        .checkmark { font-size: 80px; color: var(--om-orange); margin-bottom: 20px; }
        .preview-img-item { width: 80px; height: 80px; object-fit: cover; border: 2px solid var(--om-orange); border-radius: 4px; }
    </style>
</head>
<body>

<div class="wizard-container">
    <div class="thick-line"></div>

    <div id="step1" class="step active">
        <h2>Post Ad</h2>
        <div class="location-list" onclick="selectCountry('usa')">United States</div>
        <div class="location-list" onclick="selectCountry('canada')">Canada</div>
        <div class="location-list" onclick="selectCountry('europe')">Europe</div>
        <div class="location-list" onclick="selectCountry('asia')">Asia & Middle East</div>
        <div class="location-list" onclick="selectCountry('latinamerica')">Latin America</div>
        <div class="location-list" onclick="selectCountry('oceania')">Australia</div>
    </div>

    <div id="step2" class="step">
        <h2>Choose City</h2>
        <div id="city-list-container"></div>
    </div>

    <div id="step3" class="step">
        <h2 id="final-location-title">Details</h2>
        <form id="adForm">
            <label>Category</label>
            <select id="ad-category" required>
                <option value="bodyrubs">Bodyrubs</option>
                <option value="massage">Regular Massage</option>
                <option value="trans">Transsexual Massage</option>
                <option value="female">Female Therapists</option>
                <option value="strippers">Strippers</option>
            </select>

            <label>Ad Title</label>
            <input type="text" id="ad-title" placeholder="Catchy title..." required>

            <label>Description</label>
            <textarea id="ad-content" placeholder="Describe your services..." required></textarea>

            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;"><label>Age</label><input type="number" id="ad-age" placeholder="21" required></div>
                <div style="flex: 1;"><label>Price</label><input type="text" id="ad-price" placeholder="$100" required></div>
            </div>

            <label>Contact Phone</label>
            <input type="tel" id="ad-phone" placeholder="Phone Number" required>

            <label>Upload Photos (Max 2)</label>
            <input type="file" id="ad-image-input" accept="image/*" multiple required>
            <div id="img-preview-box" style="display:flex; gap:10px; margin-top:10px;"></div>

            <div class="section-tag">SOCIAL LINKS</div>
            <label><i class="fa-brands fa-whatsapp"></i> WhatsApp</label>
            <input type="text" id="whatsapp" placeholder="e.g. 15551234567">

            <label><i class="fa-brands fa-telegram"></i> Telegram</label>
            <input type="text" id="telegram" placeholder="Username">

            <label><i class="fa-brands fa-snapchat"></i> Snapchat</label>
            <input type="text" id="snapchat" placeholder="Username">

            <button type="submit" id="submit-btn" class="btn-black">Post Ad </button>
        </form>

        <div id="success-msg" class="success-box" style="display:none;">
            <div class="checkmark"><i class="fa-solid fa-circle-check"></i></div>
            <h2>POSTED!</h2>
            <p>Your ad is now live in <span id="conf-city" style="color:var(--om-orange); font-weight:bold;"></span>.</p>
        </div>
    </div>
</div>

<script src="location.js"></script>
<script>
    let selectedCity = "";
    let imageArray = []; 

    window.nextStep = function(num) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + num).classList.add('active');
        window.scrollTo(0,0);
    }

    window.selectCountry = function(country) {
        const container = document.getElementById('city-list-container');
        container.innerHTML = "";
        if (typeof locations === 'undefined') {
            alert("Error: location.js not found. Check if the file exists.");
            return;
        }
        const regions = locations[country];
        for (let regionName in regions) {
            regions[regionName].forEach(city => {
                const div = document.createElement('div');
                div.className = "location-list";
                div.innerText = city;
                div.onclick = () => {
                    selectedCity = city;
                    document.getElementById('final-location-title').innerText = "Post in " + city;
                    document.getElementById('conf-city').innerText = city;
                    nextStep(3);
                };
                container.appendChild(div);
            });
        }
        nextStep(2);
    }

    document.getElementById('ad-image-input').onchange = function(e) {
        const files = Array.from(e.target.files);
        const previewBox = document.getElementById('img-preview-box');
        previewBox.innerHTML = "";
        imageArray = [];
        if (files.length > 2) { alert("Max 2 photos."); this.value = ""; return; }
        files.forEach(file => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; 
                    canvas.height = (img.height / img.width) * 600;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataurl = canvas.toDataURL('image/jpeg', 0.6);
                    imageArray.push(dataurl);
                    previewBox.innerHTML += `<img src="${dataurl}" class="preview-img-item">`;
                };
            };
        });
    };

    document.getElementById('adForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        const newAd = {
            city: selectedCity.toLowerCase().trim(),
            category: document.getElementById('ad-category').value,
            title: document.getElementById('ad-title').value,
            phone: document.getElementById('ad-phone').value,
            content: document.getElementById('ad-content').value,
            price: document.getElementById('ad-price').value,
            age: document.getElementById('ad-age').value,
            whatsapp: document.getElementById('whatsapp').value,
            telegram: document.getElementById('telegram').value,
            snapchat: document.getElementById('snapchat').value,
            images: imageArray 
        };

        try {
    const response = await fetch('/api/ads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newAd)
    });
            if (response.ok) {
                document.getElementById('adForm').style.display = "none";
                document.getElementById('success-msg').style.display = "block";
                setTimeout(() => { window.location.href = "index.html"; }, 2000);
            } else {
                alert("Upload failed.");
                btn.disabled = false;
                btn.innerText = "POST AD";
            }
        } catch (err) {
            alert("Connection error.");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
