<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnivo | Secure Authentication</title>
    <style>
        :root {
            --deep-orange: #ff5722;
            --black: #000000;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            color: var(--black);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .brand-line { height: 5px; background: var(--deep-orange); width: 60px; margin: 0 auto 15px; }
        h2 { text-transform: uppercase; margin: 0; font-weight: 800; text-align: center; font-size: 1.5rem; }
        .subtitle { color: #666; font-size: 13px; margin: 5px 0 20px; text-align: center; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { text-align: left; margin-bottom: 10px; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 10px; font-weight: bold; color: #333; margin-bottom: 4px; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-auth {
            width: 100%;
            background: var(--deep-orange);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }

        .footer { margin-top: 20px; font-size: 13px; text-align: center; border-top: 1px solid #eee; padding-top: 15px; }
        .toggle-btn { color: var(--deep-orange); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand-line"></div>
    
    <div id="signup-box">
        <h2>Sign Up</h2>
        <p class="subtitle">Join the Omnivo Marketplace.</p>
        <form id="signup-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="s-name" required>
                </div>
                <div class="form-group">
                    <label>Age (18+)</label>
                    <input type="number" id="s-age" min="18" required>
                </div>
                <div class="form-group">
                    <label>Sex</label>
                    <select id="s-sex" required>
                        <option value="">Select...</option>
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <select id="s-country" onchange="updateCountryDetails()" required>
                        <option value="">Select...</option>
                        <optgroup label="North America">
                            <option value="USA" data-code="+1">USA</option>
                            <option value="Canada" data-code="+1">Canada</option>
                        </optgroup>
                        <optgroup label="Europe">
                            <option value="UK" data-code="+44">United Kingdom</option>
                            <option value="France" data-code="+33">France</option>
                            <option value="Germany" data-code="+49">Germany</option>
                            <option value="Italy" data-code="+39">Italy</option>
                            <option value="Spain" data-code="+34">Spain</option>
                            <option value="Netherlands" data-code="+31">Netherlands</option>
                            <option value="Switzerland" data-code="+41">Switzerland</option>
                            <option value="Sweden" data-code="+46">Sweden</option>
                        </optgroup>
                        <optgroup label="Middle East">
                            <option value="Saudi Arabia" data-code="+966">Saudi Arabia</option>
                            <option value="Qatar" data-code="+974">Qatar</option>
                            <option value="Kuwait" data-code="+965">Kuwait</option>
                        </optgroup>
                        <optgroup label="Oceania">
                            <option value="Australia" data-code="+61">Australia</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label id="phone-label">Phone Number</label>
                    <input type="tel" id="s-phone" placeholder="+1" required>
                </div>
                <div class="form-group">
                    <label id="zip-label">Zip / Postal Code</label>
                    <input type="text" id="s-zip" required>
                </div>
                <div class="form-group full-width">
                    <label>Email Address</label>
                    <input type="email" id="s-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="s-pass" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="s-confirm" required>
                </div>
            </div>
            <button type="submit" class="btn-auth" id="signup-btn">CREATE ACCOUNT</button>
        </form>
        <p class="footer">Member already? <span class="toggle-btn" onclick="toggle()">Sign In</span></p>
    </div>

    <div id="signin-box" style="display:none;">
        <h2>Sign In</h2>
        <p class="subtitle">Access your account.</p>
        <form id="signin-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="l-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="l-pass" required>
            </div>
            <button type="submit" class="btn-auth" id="signin-btn">SIGN IN</button>
        </form>
        <p class="footer">New here? <span class="toggle-btn" onclick="toggle()">Create Account</span></p>
    </div>
</div>

<script>
    // const API_URL = "http://localhost:3000/api/auth";
    const API_URL = "http://127.0.0.1:3000/api/auth";


    function updateCountryDetails() {
        const countrySelect = document.getElementById('s-country');
        const phoneInput = document.getElementById('s-phone');
        const zipLabel = document.getElementById('zip-label');
        
        const selectedOption = countrySelect.options[countrySelect.selectedIndex];
        const dialCode = selectedOption.getAttribute('data-code');

        if (dialCode) {
            phoneInput.value = dialCode + " ";
        }

        if (countrySelect.value === "USA") {
            zipLabel.innerText = "Zip Code";
        } else {
            zipLabel.innerText = "Postal Code";
        }
    }

    function toggle() {
        const s = document.getElementById('signup-box');
        const l = document.getElementById('signin-box');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
        l.style.display = l.style.display === 'none' ? 'block' : 'none';
    }

    // --- MONGODB SIGNUP ---
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('signup-btn');
        const pass = document.getElementById('s-pass').value;
        const confirm = document.getElementById('s-confirm').value;
        const email = document.getElementById('s-email').value.toLowerCase().trim();

        if (pass !== confirm) { alert("Passwords do not match!"); return; }

        btn.innerText = "SAVING TO CLOUD...";
        btn.disabled = true;

        const userData = {
            name: document.getElementById('s-name').value,
            age: document.getElementById('s-age').value,
            sex: document.getElementById('s-sex').value,
            country: document.getElementById('s-country').value,
            phone: document.getElementById('s-phone').value.trim(),
            zip: document.getElementById('s-zip').value,
            email: email,
            password: pass
        };

        try {
            const response = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            const result = await response.json();

            if (response.ok) {
                alert("Account created successfully!");
                toggle();
            } else {
                alert(result.message || "Signup failed.");
            }
        } catch (err) {
            alert("Connection error. Is your server running?");
        } finally {
            btn.innerText = "CREATE ACCOUNT";
            btn.disabled = false;
        }
    });

    // --- MONGODB LOGIN ---
    document.getElementById('signin-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('signin-btn');
        const email = document.getElementById('l-email').value.toLowerCase().trim();
        const password = document.getElementById('l-pass').value;

        btn.innerText = "VERIFYING...";
        btn.disabled = true;

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('currentUser', JSON.stringify(result.user));
                // Redirect based on role
                window.location.href = result.user.role === 'admin' ? 'admin.html' : 'post-ad.html';
            } else {
                alert(result.message || "Login failed.");
            }
        } catch (err) {
            alert("Connection error.");
        } finally {
            btn.innerText = "SIGN IN";
            btn.disabled = false;
        }
    });
</script>
<!-- <script src="server.js"></script> -->
</body>
</html>
