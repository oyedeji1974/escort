<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Ads | Omnivo Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root { 
            --bronze: #CD7F32; 
            --black: #1a1a1a; 
            --cream: #fffdfb;
            --bedpage-blue: #0000ee;
            --wa-green: #25D366;
            --phone-purple: #6b4fbb;
        }

        body { font-family: Arial, sans-serif; background-color: white; margin: 0; color: #333; }

        /* HEADER BAR */
        .breadcrumb-bar { 
            background: var(--black); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 3px solid var(--bronze); 
        }
        .back-link { color: var(--bronze); text-decoration: none; font-weight: bold; }

        .ads-container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        /* DYNAMIC HEADING STYLE */
        #city-heading { 
            margin: 0; 
            text-transform: uppercase; 
            color: var(--black); 
            font-size: 26px; 
            font-weight: 900;
            text-align: center;
        }
        .gold-text { color: var(--bronze); }
        .line-center { height: 4px; background: var(--bronze); width: 60px; margin: 10px auto 25px auto; }

        /* THE LIST ITEM (COLLAPSED) */
        .ad-card {
            background: white;
            border-bottom: 1px solid #eee;
            margin-bottom: 2px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ad-card:hover { background-color: #fcfaf8; }

        .ad-row-summary { padding: 15px; display: flex; flex-direction: column; }

        .ad-title-link {
            color: var(--bedpage-blue);
            font-size: 19px;
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 4px;
        }

        .ad-subtitle { color: #666; font-size: 14px; font-weight: bold; }

        /* THE DETAIL VIEW (EXPANDED) */
        .ad-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
            background: #fff;
        }

        .ad-card.active .ad-details {
            max-height: 5000px; /* Large enough to fit any content */
            padding: 20px 15px;
            border-top: 1px solid #eee;
            background: var(--cream);
        }

        /* 4-BUTTON GRID */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }

        .btn-action {
            padding: 12px 5px;
            text-align: center;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-wa { background: var(--wa-green); }
        .btn-call { background: var(--black); border-bottom: 2px solid var(--bronze); }
        .btn-sms { background: #3b82f6; }
        .btn-report { background: #ef4444; }

        /* 2x2 IMAGE GRID */
        .image-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 15px 0;
        }

        .ad-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 6px;
            background: #eee;
        }

        /* INFO TABLE */
        .info-table {
            border-top: 2px solid var(--bronze);
            padding-top: 15px;
            margin-top: 20px;
        }

        .info-row { display: flex; margin-bottom: 10px; font-size: 15px; }
        .info-label { width: 130px; font-weight: bold; color: var(--black); }

        .loading { text-align: center; padding: 40px; color: var(--bronze); font-weight: bold; }
    </style>
</head>

<body>

<nav class="breadcrumb-bar">
    <a href="javascript:history.back()" class="back-link">← BACK</a>
    <a href="post-ad.html" class="back-link" style="color:white;">POST +</a>
</nav>

<div class="ads-container">
    <h1 id="city-heading">LATEST IN <span class="gold-text">GALLERY</span></h1>
    <div class="line-center"></div>
    
    <div id="ads-list" class="loading">CONNECTING TO DATABASE...</div>
</div>

<script>
async function loadAds() {
    const list = document.getElementById('ads-list');
    const header = document.getElementById('city-heading');
    const urlParams = new URLSearchParams(window.location.search);
    const city = urlParams.get('city') || "";
    const category = urlParams.get('cat') || "";

    // Set Dynamic Heading
    if(city) {
        header.innerHTML = `LATEST IN <span class="gold-text">${city.toUpperCase()}</span>`;
    }

    try {
        // IMPORTANT: We filter by city on the server to keep it fast
        const res = await fetch(`http://localhost:3000/api/ads?city=${city.toLowerCase()}&cat=${category}`);
        const ads = await res.json();

        if (!ads.length) {
            list.innerHTML = `<div style="text-align:center; padding:50px;">No ads found in ${city}.</div>`;
            return;
        }

        list.innerHTML = "";

        ads.forEach(ad => {
            const div = document.createElement('div');
            div.className = 'ad-card';

            // Build Image Gallery
            let imageHtml = "";
            if (ad.images && ad.images.length > 0) {
                imageHtml = `<div class="image-gallery">`;
                ad.images.forEach(imgData => {
                    imageHtml += `<img src="${imgData}" class="ad-img" loading="lazy">`;
                });
                imageHtml += `</div>`;
            }

            div.innerHTML = `
                <div class="ad-row-summary">
                    <div class="ad-title-link">!! ${ad.title.toUpperCase()} !!</div>
                    <div class="ad-subtitle">${ad.phone} - ${ad.city.toUpperCase()}</div>
                </div>

                <div class="ad-details">
                    <div style="font-size:20px; font-weight:900; margin-bottom:15px; color:var(--black);">
                        !! ${ad.title.toUpperCase()} !!
                    </div>

                    <div class="action-grid">
                        <a href="https://wa.me/${ad.phone}" target="_blank" class="btn-action btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                        <a href="tel:${ad.phone}" class="btn-action btn-call"><i class="fa fa-phone"></i> Call</a>
                        <a href="sms:${ad.phone}" class="btn-action btn-sms"><i class="fa fa-comment"></i> SMS</a>
                        <a href="#" class="btn-action btn-report"><i class="fa fa-flag"></i> Report</a>
                    </div>

                    ${imageHtml}

                    <p style="white-space: pre-line; line-height: 1.8; margin: 20px 0; font-size:16px;">
                        ${ad.content || ad.description}
                    </p>

                    <div class="info-table">
                        <div class="info-row"><div class="info-label">POSTER AGE :</div><div>${ad.age}</div></div>
                        <div class="info-row"><div class="info-label">MOBILE :</div><div>${ad.phone}</div></div>
                        <div class="info-row"><div class="info-label">PRICE :</div><div style="color:var(--bronze); font-weight:bold;">$${ad.price}</div></div>
                        <div class="info-row"><div class="info-label">LOCATION :</div><div>${ad.city.toUpperCase()}</div></div>
                    </div>
                </div>
            `;

            // Click logic for expansion
            div.addEventListener('click', (e) => {
                // Don't collapse if clicking a button or link
                if (e.target.tagName !== 'A' && !e.target.closest('.btn-action')) {
                    // Close other active cards first (optional, for a cleaner look)
                    // document.querySelectorAll('.ad-card.active').forEach(card => { if(card !== div) card.classList.remove('active'); });
                    
                    div.classList.toggle('active');
                }
            });

            list.appendChild(div);
        });

    } catch (err) {
        list.innerHTML = `<div style="color:red; text-align:center;">SERVER ERROR: Please ensure your backend is running on port 3000.</div>`;
    }
}

loadAds();
</script>

</body>
</html>
