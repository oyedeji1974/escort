<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>View Ads | Omnivo Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root { 
            --bronze: #CD7F32; 
            --black: #1a1a1a; 
            --cream: #fffdfb;
            --bedpage-blue: #0000ee;
            --wa-green: #25D366;
            --phone-purple: #6b4fbb;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; 
            color: #333; 
            line-height: 1.5;
        }

        /* HEADER BAR - Sleeker height */
        .breadcrumb-bar { 
            background: var(--black); 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid var(--bronze); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .back-link { color: var(--bronze); text-decoration: none; font-weight: 700; font-size: 14px; }

        .ads-container { 
            max-width: 600px; /* Tighter for mobile focus */
            margin: 0 auto; 
            padding: 10px; 
        }
        
        /* DYNAMIC HEADING */
        #city-heading { 
            margin: 15px 0 5px 0; 
            text-transform: uppercase; 
            color: var(--black); 
            font-size: 22px; 
            font-weight: 900;
            text-align: center;
            letter-spacing: 1px;
        }
        .gold-text { color: var(--bronze); }
        .line-center { height: 3px; background: var(--bronze); width: 40px; margin: 5px auto 20px auto; }

        /* THE LIST ITEM */
        .ad-card {
            background: white;
            border-radius: 8px; /* Rounded corners for modern look */
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #eee;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        .ad-card:active { transform: scale(0.98); }

        .ad-row-summary { 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            background: #ffffff;
        }

        .ad-title-link {
            color: var(--bedpage-blue);
            font-size: 18px;
            font-weight: 800;
            text-decoration: none; /* Cleaner look */
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .ad-subtitle { 
            color: #555; 
            font-size: 13px; 
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .ad-subtitle::before { content: '📍'; font-size: 12px; }

        /* THE DETAIL VIEW */
        .ad-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
            background: #fff;
        }

        .ad-card.active .ad-details {
            max-height: 10000px; 
            padding: 0 15px 20px 15px;
            border-top: 1px solid #f0f0f0;
            background: var(--cream);
        }

        /* 4-BUTTON GRID - Optimized for Thumbs */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2x2 grid is much better for mobile thumbs */
            gap: 10px;
            margin: 15px 0;
        }

        .btn-action {
            padding: 14px 5px;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 800;
            color: white;
            font-size: 13px;
            display: flex;
            flex-direction: row; /* Icon next to text for 2x2 grid */
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .btn-wa { background: var(--wa-green); box-shadow: 0 3px 0 #1da851; }
        .btn-call { background: var(--black); box-shadow: 0 3px 0 #000; border-bottom: 2px solid var(--bronze); }
        .btn-sms { background: #3b82f6; box-shadow: 0 3px 0 #1d4ed8; }
        .btn-report { background: #ef4444; box-shadow: 0 3px 0 #b91c1c; }

        /* IMAGE GRID - High Visibility */
        .image-gallery {
            display: flex;
            flex-direction: column; /* Vertical stack is better for showing full detail on small screens */
            gap: 10px;
            margin: 15px 0;
        }

        .ad-img {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        /* INFO TABLE - Mobile friendly rows */
        .info-table {
            border-top: 2px solid var(--bronze);
            padding-top: 15px;
            margin-top: 20px;
            background: #fdfdfd;
        }

        .info-row { 
            display: flex; 
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
            font-size: 14px; 
        }
        .info-label { font-weight: 800; color: #777; font-size: 12px; }
        .info-value { font-weight: 700; color: var(--black); }

        .loading { text-align: center; padding: 60px 20px; color: var(--bronze); font-weight: bold; font-size: 14px; }
        
        /* Pulse Animation for Loading */
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>

<body>

<nav class="breadcrumb-bar">
    <a href="javascript:history.back()" class="back-link"><i class="fa fa-chevron-left"></i> BACK</a>
    <a href="post-ad.html" class="back-link" style="color:white; background:var(--bronze); padding: 5px 12px; border-radius: 4px;">POST +</a>
</nav>

<div class="ads-container">
    <h1 id="city-heading">LATEST IN <span class="gold-text">GALLERY</span></h1>
    <div class="line-center"></div>
    
    <div id="ads-list" class="loading">SEARCHING FOR ADS...</div>
</div>

<script>
async function loadAds() {
    const list = document.getElementById('ads-list');
    const header = document.getElementById('city-heading');
    const urlParams = new URLSearchParams(window.location.search);
    const city = urlParams.get('city') || "";
    const category = urlParams.get('cat') || "";

    if(city) {
        header.innerHTML = `LATEST IN <span class="gold-text">${city.toUpperCase()}</span>`;
    }

    try {
        const res = await fetch(`/api/ads${window.location.search}`);
        if (!res.ok) throw new Error(`Server status: ${res.status}`);
        const ads = await res.json();

        if (!ads.length) {
            list.innerHTML = `<div style="text-align:center; padding:50px; font-weight:bold; color:#888;">No ads found in ${city || 'this area'}.</div>`;
            return;
        }

        list.innerHTML = "";

        ads.forEach(ad => {
            const div = document.createElement('div');
            div.className = 'ad-card';

            let imageHtml = "";
            if (ad.images && ad.images.length > 0) {
                imageHtml = `<div class="image-gallery">`;
                ad.images.forEach(imgData => {
                    imageHtml += `<img src="${imgData}" class="ad-img" loading="lazy">`;
                });
                imageHtml += `</div>`;
            }

            div.innerHTML = `
                <div class="ad-row-summary">
                    <div class="ad-title-link">!! ${ad.title.toUpperCase()} !!</div>
                    <div class="ad-subtitle">${ad.city.toUpperCase()} - CLICK TO VIEW</div>
                </div>

                <div class="ad-details">
                    <div style="font-size:18px; font-weight:900; margin: 10px 0; color:var(--black); border-left: 4px solid var(--bronze); padding-left: 10px;">
                        ${ad.title.toUpperCase()}
                    </div>

                    <div class="action-grid">
                        <a href="https://wa.me/${ad.phone}" target="_blank" class="btn-action btn-wa"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                        <a href="tel:${ad.phone}" class="btn-action btn-call"><i class="fa fa-phone"></i> CALL</a>
                        <a href="sms:${ad.phone}" class="btn-action btn-sms"><i class="fa fa-comment"></i> SMS</a>
                        <a href="#" class="btn-action btn-report"><i class="fa fa-flag"></i> REPORT</a>
                    </div>

                    ${imageHtml}

                    <p style="white-space: pre-line; line-height: 1.6; margin: 20px 0; font-size:15px; color:#444; background: #fff; padding: 10px; border-radius: 5px;">
                        ${ad.content || ad.description}
                    </p>

                    <div class="info-table">
                        <div class="info-row"><span class="info-label">AGE</span><span class="info-value">${ad.age}</span></div>
                        <div class="info-row"><span class="info-label">MOBILE</span><span class="info-value">${ad.phone}</span></div>
                        <div class="info-row"><span class="info-label">PRICE</span><span class="info-value" style="color:var(--bronze);">$${ad.price}</span></div>
                        <div class="info-row"><span class="info-label">LOCATION</span><span class="info-value">${ad.city.toUpperCase()}</span></div>
                    </div>
                </div>
            `;

            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'A' && !e.target.closest('.btn-action')) {
                    div.classList.toggle('active');
                    if(div.classList.contains('active')) {
                        setTimeout(() => div.scrollIntoView({ behavior: 'smooth', block: 'start' }), 300);
                    }
                }
            });

            list.appendChild(div);
        });

    } catch (err) {
        console.error("Fetch Error:", err);
        list.innerHTML = `<div style="color:red; text-align:center; padding:20px; font-size:14px;">
            <strong>DATABASE CONNECTION ERROR</strong><br>
            <small>${err.message}</small><br><br>
            <button onclick="location.reload()" style="background:var(--bronze); color:white; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">RETRY NOW</button>
        </div>`;
    }
}

loadAds();
</script>

</body>
</html>
