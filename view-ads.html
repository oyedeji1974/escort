<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Ads | Omnivo Global</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
:root { --bronze: #CD7F32; --deep-bronze: #804A00; --black: #1a1a1a; --cream: #fffdfb; }

body {
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--cream);
    margin: 0;
    color: #333;
}

.breadcrumb-bar {
    background: var(--black);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    border-bottom: 3px solid var(--bronze);
}

.back-link {
    color: var(--bronze);
    text-decoration: none;
    font-weight: bold;
}

.ads-container {
    max-width: 800px;
    margin: 20px auto;
    padding: 0 15px;
}

h1 { margin: 0; text-transform: capitalize; color: var(--black); }

.line {
    height: 4px;
    background: var(--bronze);
    width: 60px;
    margin: 15px 0 25px 0;
}

.ad-card {
    background: white;
    border: 1px solid #ddd;
    border-left: 5px solid var(--bronze);
    margin-bottom: 12px;
    padding: 15px;
    cursor: pointer;
    border-radius: 6px;
}

.ad-row-summary {
    display: flex;
    justify-content: space-between;
}

.ad-title {
    font-size: 1.1rem;
    font-weight: bold;
}

.ad-price {
    color: var(--deep-bronze);
    font-weight: bold;
}

/* 🔥 Smooth expand */
.ad-details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
}

.ad-card.active .ad-details {
    max-height: 1200px;
}

.image-gallery {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    margin-bottom: 15px;
}

.ad-img {
    width: 220px;
    height: 300px;
    object-fit: cover;
    border-radius: 6px;
    background: #eee;
}

.contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.btn-action {
    padding: 12px;
    text-align: center;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-call { background: var(--black); border-bottom: 3px solid var(--bronze); }
.btn-wa { background: #25D366; }

.loading {
    text-align: center;
    padding: 40px;
    color: var(--bronze);
    font-weight: bold;
}
</style>
</head>

<body>

<nav class="breadcrumb-bar">
    <a href="javascript:history.back()" class="back-link">← BACK</a>
    <a href="post-ad.html" class="back-link" style="color:white;">POST +</a>
</nav>

<div class="ads-container">
    <h1 id="category-title">Ads</h1>
    <p id="city-subtitle">Connecting...</p>
    <div class="line"></div>
    <div id="ads-list" class="loading"></div>
</div>


<script>
async function loadAds() {
    const list = document.getElementById('ads-list');

    list.innerHTML = "Loading ads...";

    try {
        const res = await fetch('http://127.0.0.1:3000/api/ads');
        const ads = await res.json();

        if (!ads.length) {
            list.innerHTML = "No ads found.";
            return;
        }

        list.innerHTML = "";

        ads.forEach(ad => {
            const div = document.createElement('div');
            div.className = 'ad-card';

            div.innerHTML = `
                <div class="ad-row-summary">
                    <div class="ad-title">${ad.title}</div>
                    <div class="ad-price">₦${ad.price}</div>
                </div>

                <div class="ad-details">
                    <p>${ad.description || ad.content || ""}</p>

                    <div class="contact-grid">
                        <a href="tel:${ad.phone}" class="btn-action btn-call">Call</a>
                        <a href="https://wa.me/${ad.phone}" class="btn-action btn-wa">WhatsApp</a>
                        <a href="#" class="btn-action btn-snap">Snapchat</a>
                        <a href="#" class="btn-action btn-telegram">Telegram</a>
                    </div>
                </div>
            `;

            div.addEventListener('click', () => {
                div.classList.toggle('active');
            });

            list.appendChild(div);
        });

    } catch (err) {
        console.error(err);
        list.innerHTML = "Error loading ads.";
    }
}

loadAds();
</script>

</body>
</html>
